version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/dev.db:/app/dev.db
    environment:
      - DATABASE_URL=file:/app/dev.db
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
